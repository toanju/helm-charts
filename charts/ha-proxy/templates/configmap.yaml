apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ha-proxy.fullname" . }}
  labels:
    {{- include "ha-proxy.labels" . | nindent 4 }}
data:
  config.toml: |
    # Generated by Helm — do not edit directly.
    ha_url      = {{ required "config.haUrl is required" .Values.config.haUrl | quote }}
    listen      = "0.0.0.0:8080"
    token_file  = "/token/{{ .Values.token.secretKey }}"
    max_body_bytes = {{ .Values.config.maxBodyBytes }}
    {{- range .Values.config.allow }}

    [[allow]]
    domain   = {{ .domain | quote }}
    {{- if .services }}
    services = {{ toJson .services }}
    {{- else }}
    services = []
    {{- end }}
    {{- end }}
