apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ha-proxy.fullname" . }}
  labels:
    {{- include "ha-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ha-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Re-roll pods when the ConfigMap content changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ha-proxy.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ha-proxy.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ha-proxy
          image: {{ include "ha-proxy.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -c
            - /config/config.toml
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: token
              mountPath: /token
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ha-proxy.fullname" . }}
        - name: token
          secret:
            secretName: {{ required "token.secretName is required" .Values.token.secretName }}
            items:
              - key: {{ .Values.token.secretKey }}
                path: {{ .Values.token.secretKey }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
